<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design Sketches — $PROJECT_NAME</title>
  <link rel="stylesheet" href="../system/tokens.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --shell-sidebar-w: 260px;
      --shell-toolbar-h: 48px;
      --shell-bg: #f5f5f7;
      --shell-sidebar-bg: #ffffff;
      --shell-border: #e0e0e0;
      --shell-text: #1d1d1f;
      --shell-text-muted: #86868b;
      --shell-accent: #0071e3;
      --shell-accent-hover: #0077ed;
      --shell-badge-explore: #f0ad4e;
      --shell-badge-adopt: #5cb85c;
      --shell-badge-discard: #d9534f;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --shell-bg: #1c1c1e;
        --shell-sidebar-bg: #2c2c2e;
        --shell-border: #3a3a3c;
        --shell-text: #f5f5f7;
        --shell-text-muted: #98989d;
        --shell-accent: #2997ff;
        --shell-accent-hover: #64b5f6;
      }
    }

    body.shell-dark {
      --shell-bg: #1c1c1e;
      --shell-sidebar-bg: #2c2c2e;
      --shell-border: #3a3a3c;
      --shell-text: #f5f5f7;
      --shell-text-muted: #98989d;
      --shell-accent: #2997ff;
      --shell-accent-hover: #64b5f6;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--shell-bg);
      color: var(--shell-text);
      height: 100vh;
      display: grid;
      grid-template-columns: var(--shell-sidebar-w) 1fr;
      grid-template-rows: var(--shell-toolbar-h) 1fr;
      overflow: hidden;
    }

    /* ── Toolbar ─────────────────────────────────────────────────── */
    .toolbar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      background: var(--shell-sidebar-bg);
      border-bottom: 1px solid var(--shell-border);
      font-size: 13px;
    }

    .toolbar-title {
      font-weight: 600;
      margin-right: auto;
    }

    .toolbar-file {
      color: var(--shell-text-muted);
      font-size: 12px;
      margin-right: auto;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .toolbar button, .toolbar select {
      background: var(--shell-bg);
      color: var(--shell-text);
      border: 1px solid var(--shell-border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .toolbar button:hover {
      background: var(--shell-accent);
      color: #fff;
      border-color: var(--shell-accent);
    }

    .toolbar button.active {
      background: var(--shell-accent);
      color: #fff;
      border-color: var(--shell-accent);
    }

    /* ── Sidebar ─────────────────────────────────────────────────── */
    .sidebar {
      background: var(--shell-sidebar-bg);
      border-right: 1px solid var(--shell-border);
      overflow-y: auto;
      padding: 12px 0;
    }

    .sidebar-section {
      margin-bottom: 8px;
    }

    .sidebar-section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--shell-text-muted);
      padding: 8px 16px 4px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.1s;
      text-decoration: none;
      color: var(--shell-text);
    }

    .sidebar-item:hover {
      background: var(--shell-bg);
    }

    .sidebar-item.active {
      background: var(--shell-accent);
      color: #fff;
    }

    .sidebar-item.active .badge {
      opacity: 0.8;
    }

    .badge {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      padding: 1px 5px;
      border-radius: 3px;
      margin-left: auto;
      flex-shrink: 0;
    }

    .badge-exploring { background: var(--shell-badge-explore); color: #fff; }
    .badge-adopted { background: var(--shell-badge-adopt); color: #fff; }
    .badge-discarded { background: var(--shell-badge-discard); color: #fff; }

    /* ── Main ────────────────────────────────────────────────────── */
    .main {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--shell-bg);
      overflow: hidden;
      padding: 16px;
    }

    .main iframe {
      border: 1px solid var(--shell-border);
      border-radius: 8px;
      background: #fff;
      transition: width 0.3s ease, height 0.3s ease;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .empty-state {
      text-align: center;
      color: var(--shell-text-muted);
    }

    .empty-state h2 {
      font-size: 18px;
      margin-bottom: 8px;
      color: var(--shell-text);
    }

    .empty-state p {
      font-size: 13px;
    }
  </style>
</head>
<body>

  <!-- Toolbar -->
  <div class="toolbar">
    <span class="toolbar-title">$PROJECT_NAME</span>
    <span class="toolbar-file" id="current-file">No sketch selected</span>

    <div class="toolbar-group">
      <button data-viewport="390" title="Mobile">Mobile</button>
      <button data-viewport="768" title="Tablet">Tablet</button>
      <button data-viewport="1280" title="Desktop">Desktop</button>
      <button data-viewport="full" title="Full width" class="active">Full</button>
    </div>

    <div class="toolbar-group">
      <button id="btn-dark-toggle" title="Toggle dark mode for sketches">Dark</button>
    </div>
  </div>

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar"></nav>

  <!-- Main -->
  <main class="main" id="main">
    <div class="empty-state">
      <h2>No sketch selected</h2>
      <p>Pick a sketch from the sidebar, or run <code>/design</code> to create one.</p>
    </div>
  </main>

  <script>
    // ── Sketch Manifest ───────────────────────────────────────────
    // The /design agent maintains this array. Each entry:
    //   { section, file, name, status, date, description }
    // Status: "exploring" | "adopted" | "discarded"
    const SKETCHES = [
      // Example (agent will add real entries here):
      // { section: "auth", file: "auth/login-v1.html", name: "Login", status: "exploring", date: "2026-03-11", description: "Email + password login" },
    ];

    // ── State ─────────────────────────────────────────────────────
    let currentFile = null;
    let currentViewport = 'full';
    let darkMode = false;

    // ── Render Sidebar ────────────────────────────────────────────
    function renderSidebar() {
      const sidebar = document.getElementById('sidebar');
      const sections = {};

      SKETCHES.forEach(s => {
        if (!sections[s.section]) sections[s.section] = [];
        sections[s.section].push(s);
      });

      let html = '';
      for (const [section, items] of Object.entries(sections)) {
        html += `<div class="sidebar-section">`;
        html += `<div class="sidebar-section-title">${section}</div>`;
        items.forEach(item => {
          const badgeClass = `badge-${item.status}`;
          const activeClass = currentFile === item.file ? ' active' : '';
          html += `<a class="sidebar-item${activeClass}" data-file="${item.file}" title="${item.description || ''}">
            <span>${item.name}</span>
            <span class="badge ${badgeClass}">${item.status}</span>
          </a>`;
        });
        html += `</div>`;
      }

      if (SKETCHES.length === 0) {
        html = `<div style="padding:16px;color:var(--shell-text-muted);font-size:13px;">
          No sketches yet.<br>Run <code>/design</code> to create one.
        </div>`;
      }

      sidebar.innerHTML = html;

      sidebar.querySelectorAll('.sidebar-item').forEach(el => {
        el.addEventListener('click', () => loadSketch(el.dataset.file));
      });
    }

    // ── Load Sketch ───────────────────────────────────────────────
    function loadSketch(file) {
      currentFile = file;
      const main = document.getElementById('main');
      const fileLabel = document.getElementById('current-file');
      fileLabel.textContent = file;

      const iframe = document.createElement('iframe');
      iframe.id = 'sketch-frame';
      iframe.src = file;
      applyViewport(iframe);

      main.innerHTML = '';
      main.appendChild(iframe);

      iframe.addEventListener('load', () => {
        if (darkMode) injectDarkMode(iframe);
        injectPrototypeLinks(iframe);
      });

      renderSidebar();
    }

    // ── Viewport Toggle ───────────────────────────────────────────
    function applyViewport(iframe) {
      const mainEl = document.getElementById('main');
      const maxW = mainEl.clientWidth - 32;
      const maxH = mainEl.clientHeight - 32;

      if (currentViewport === 'full') {
        iframe.style.width = '100%';
        iframe.style.height = '100%';
      } else {
        const w = parseInt(currentViewport);
        iframe.style.width = Math.min(w, maxW) + 'px';
        iframe.style.height = maxH + 'px';
      }
    }

    document.querySelectorAll('[data-viewport]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-viewport]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentViewport = btn.dataset.viewport;
        const iframe = document.getElementById('sketch-frame');
        if (iframe) applyViewport(iframe);
      });
    });

    // ── Dark Mode Toggle ──────────────────────────────────────────
    document.getElementById('btn-dark-toggle').addEventListener('click', () => {
      darkMode = !darkMode;
      document.body.classList.toggle('shell-dark', darkMode);
      document.getElementById('btn-dark-toggle').classList.toggle('active', darkMode);

      const iframe = document.getElementById('sketch-frame');
      if (iframe) {
        if (darkMode) {
          injectDarkMode(iframe);
        } else {
          removeDarkMode(iframe);
        }
      }
    });

    function injectDarkMode(iframe) {
      try {
        const doc = iframe.contentDocument;
        if (!doc) return;
        let style = doc.getElementById('shell-dark-override');
        if (!style) {
          style = doc.createElement('style');
          style.id = 'shell-dark-override';
          style.textContent = ':root { color-scheme: dark; } @media (prefers-color-scheme: light) { :root { color-scheme: dark; } }';
          doc.head.appendChild(style);
        }
        doc.documentElement.style.colorScheme = 'dark';
      } catch (e) { /* cross-origin, ignore */ }
    }

    function removeDarkMode(iframe) {
      try {
        const doc = iframe.contentDocument;
        if (!doc) return;
        const style = doc.getElementById('shell-dark-override');
        if (style) style.remove();
        doc.documentElement.style.colorScheme = '';
      } catch (e) { /* cross-origin, ignore */ }
    }

    // ── Prototype Linking ─────────────────────────────────────────
    // Sketches use: <a data-link="section/file.html">
    // We intercept clicks and navigate the shell instead of the iframe.
    function injectPrototypeLinks(iframe) {
      try {
        const doc = iframe.contentDocument;
        if (!doc) return;
        doc.addEventListener('click', (e) => {
          const link = e.target.closest('[data-link]');
          if (link) {
            e.preventDefault();
            e.stopPropagation();
            const target = link.getAttribute('data-link');
            if (target) loadSketch(target);
          }
        });
      } catch (e) { /* cross-origin, ignore */ }
    }

    // Also listen for postMessage-based navigation (alternative approach)
    window.addEventListener('message', (e) => {
      if (e.data && e.data.type === 'navigate' && e.data.file) {
        loadSketch(e.data.file);
      }
    });

    // ── Init ──────────────────────────────────────────────────────
    renderSidebar();

    // Auto-load first sketch if available
    if (SKETCHES.length > 0) {
      loadSketch(SKETCHES[0].file);
    }
  </script>

</body>
</html>
